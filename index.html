<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f4f4fb;min-height:100vh}button,input{font-family:'Segoe UI',sans-serif}</style>

<body>
<div id="root"></div>
<script type="text/babel">
const APP_PASSWORD="Skillup";
const TASK_TYPES=["Writing","Planning","Responding","Generating Ideas","Summarising"];
const TYPE_COLORS={"Writing":"#4361EE","Planning":"#3AAFA9","Responding":"#E07B54","Generating Ideas":"#8338EC","Summarising":"#F4A261"};
const MODIFIERS={"Output Quality":["Check yourself","Ask me clarifying questions","Show your reasoning / think step by step","Flag assumptions you're making","Give me 3 options, not just one"],"Tone & Style":["Less AI, more human","Casual and conversational","Formal and professional","Short and punchy","Add humour"],"Format Control":["Bullet points only","Use headers and subheadings","Limit to 150 words","Give me a table"],"Audience":["Write for a beginner","Write for an expert","Write for a Singapore audience","Write for seniors","Write for busy executives"],"Depth":["Give me the summary only","Go deep — full detail","Give me examples","Give me analogies","ELI5 (explain like I'm 5)"],"Safety & Accuracy":["Cite your sources","Tell me what you don't know","Avoid sensitive topics","Stay on topic only"]};
const MOD_COLORS={"Output Quality":"#6C63FF","Tone & Style":"#E07B54","Format Control":"#3AAFA9","Audience":"#F4A261","Depth":"#8338EC","Safety & Accuracy":"#FF477E"};

const roles=[
  {id:"student",label:"Secondary School Student",emoji:"🎒",color:"#6C63FF",prompts:[
    {title:"Essay Outline Helper",type:"Planning",prompt:"GOAL: Help me create a structured essay outline.\nCONTEXT: I am a Secondary [level] student writing an 800-word essay on [topic] for [subject] class.\nEXPECTATIONS: Give me an outline with an introduction, 3 main points, and a conclusion. Use simple, student-friendly language. Present it as a numbered list.\nSOURCE: Base this on general knowledge and standard essay structure for secondary school level."},
    {title:"Simplify a Concept",type:"Summarising",prompt:"GOAL: Explain a complex concept in simple terms.\nCONTEXT: I am a Secondary 3 student struggling to understand [concept] for my [subject] class.\nEXPECTATIONS: Use plain language, one real-life example, and a 3-bullet summary at the end. Keep it under 200 words.\nSOURCE: Use general educational knowledge appropriate for Secondary school level in Singapore."},
    {title:"Study Quiz Generator",type:"Generating Ideas",prompt:"GOAL: Create a revision quiz to help me study.\nCONTEXT: I have an exam on [topic] for [subject] coming up in [timeframe].\nEXPECTATIONS: Write 5 multiple-choice questions with 4 options each. Include the correct answers at the end. Difficulty level: [easy/medium/hard].\nSOURCE: Base questions on the Singapore MOE syllabus for [subject] at Secondary [level]."},
    {title:"Improve My Writing",type:"Writing",prompt:"GOAL: Improve the vocabulary and sentence structure of my paragraph.\nCONTEXT: I am a Secondary [level] student. Here is my original paragraph: [paste paragraph].\nEXPECTATIONS: Show me a before-and-after comparison. Keep my original ideas intact. Aim for a Grade [level] writing standard. Use British English.\nSOURCE: Apply standard English grammar and writing conventions for secondary school essays."},
    {title:"Revision Summary Sheet",type:"Summarising",prompt:"GOAL: Create a quick revision summary I can study from.\nCONTEXT: I have an exam on [topic] in [subject] in 3 days. I need a concise reference sheet.\nEXPECTATIONS: Bullet points only. Max 1 page. Highlight the 5 most important concepts. Include any formulae or key terms.\nSOURCE: Use the Singapore MOE [subject] syllabus for Secondary [level]."},
    {title:"School Presentation Script",type:"Writing",prompt:"GOAL: Help me prepare a confident and engaging school presentation.\nCONTEXT: I am a Secondary [level] student presenting on [topic] to my classmates aged 13-16. Duration: 3 minutes.\nEXPECTATIONS: Write a presentation script with slide suggestions. Include a strong opening hook, one statistic, and one real-life example. Tone: conversational and relatable.\nSOURCE: Use recent examples, school-related scenarios, and the notes I provide: [paste notes]."},
    {title:"AI Study Assistant Setup",type:"Generating Ideas",prompt:"GOAL: Help me use AI tools effectively to support my studying without doing the work for me.\nCONTEXT: I am a Secondary [level] student studying [subject]. I want to use AI to help me understand concepts, practise questions, and review my work.\nEXPECTATIONS: Give me 5 specific ways I can use AI as a study assistant. Include example prompts I can use. Tone: practical and student-friendly.\nSOURCE: Apply responsible AI use principles and Singapore MOE guidelines on digital literacy for students."},
  ]},
  {id:"socialworker",label:"Social Worker",emoji:"🤝",color:"#E07B54",prompts:[
    {title:"Case Note Writer",type:"Writing",prompt:"GOAL: Write a professional case note for a client session.\nCONTEXT: I am a social worker. Client profile (no real names): [brief description]. Key issues discussed: [list]. Outcome and follow-up actions: [list].\nEXPECTATIONS: Use a neutral, factual, third-person tone. Follow the SOAP format (Subjective, Objective, Assessment, Plan). Keep it under 250 words.\nSOURCE: Apply standard social work documentation practices used in Singapore social service agencies."},
    {title:"Resource Referral Email",type:"Writing",prompt:"GOAL: Draft a referral email to connect a client with an external organisation.\nCONTEXT: I am a social worker referring a client who needs [type of support] to [organisation type]. The reason for referral: [brief explanation].\nEXPECTATIONS: Professional and concise tone. Include: reason for referral, client background (no identifiers), and requested support. Under 200 words.\nSOURCE: Base this on standard referral letter conventions used by social service organisations in Singapore."},
    {title:"Psychoeducation Script",type:"Writing",prompt:"GOAL: Write a simple explanation of a mental health topic for a client.\nCONTEXT: My client has low health literacy and needs to understand [mental health topic, e.g. anxiety]. They are [age group].\nEXPECTATIONS: Plain language, no jargon. Use an analogy to explain the concept. Max 150 words. Warm and non-clinical tone.\nSOURCE: Use evidence-based psychoeducation principles and reputable mental health references."},
    {title:"Session Agenda Planner",type:"Planning",prompt:"GOAL: Plan a structured support session for a client.\nCONTEXT: I am a social worker preparing a 45-minute session for a [client profile, e.g. at-risk youth]. Session goals: [list].\nEXPECTATIONS: Include a timed agenda with: icebreaker (5 min), main activity (30 min), and closing reflection (10 min). Suggest one activity per section.\nSOURCE: Draw from evidence-based social work intervention methods and youth engagement practices."},
    {title:"Grant Report Draft",type:"Writing",prompt:"GOAL: Draft a concise programme report for a community grant submission.\nCONTEXT: Programme name: [name]. Target group: [group]. Key activities run: [list]. Outcomes achieved: [list]. Reporting period: [dates].\nEXPECTATIONS: Formal but readable tone. Under 300 words. Use headings. Highlight impact with specific numbers where possible.\nSOURCE: Follow standard grant reporting conventions used by Singapore VWOs and SSAs."},
    {title:"Youth Wellness Workshop Plan",type:"Planning",prompt:"GOAL: Design an engaging youth wellness workshop on managing stress and anxiety.\nCONTEXT: I am a social worker facilitating a 90-minute session for youths aged 15-18 in Singapore.\nEXPECTATIONS: Workshop outline with activities. Include: icebreakers, group discussions, and coping strategies. Tone: encouraging and supportive.\nSOURCE: Use evidence-based mental wellness approaches and examples relevant to Singapore youths."},
    {title:"AI Tools for Case Management",type:"Generating Ideas",prompt:"GOAL: Identify ways to use AI tools to improve efficiency in social work case management.\nCONTEXT: I am a social worker managing a high caseload at a [organisation type] in Singapore. I want to use AI responsibly to save time on administrative tasks.\nEXPECTATIONS: Give me 5 practical AI use cases relevant to my role. For each: describe the task, suggest an AI tool or prompt approach, and flag any ethical considerations.\nSOURCE: Apply responsible AI use principles and social work professional ethics guidelines (SASW Code of Ethics, Singapore)."},
  ]},
  {id:"teacher",label:"Primary School Teacher",emoji:"🍎",color:"#3AAFA9",prompts:[
    {title:"Lesson Plan Builder",type:"Planning",prompt:"GOAL: Create a ready-to-use lesson plan.\nCONTEXT: I am a Primary [level] [subject] teacher in Singapore. Topic: [topic]. Duration: 30 minutes. Class size: [number].\nEXPECTATIONS: Include: learning objectives, warm-up activity, main activity, and closing assessment. Use MOE-aligned language. Present in a table format.\nSOURCE: Align with the Singapore MOE primary school [subject] curriculum and syllabus."},
    {title:"Differentiated Activity",type:"Planning",prompt:"GOAL: Create differentiated activities for a mixed-ability class.\nCONTEXT: I am teaching [topic] to a Primary [level] class with varying ability levels.\nEXPECTATIONS: Provide 3 versions of the same activity - one for struggling learners, one for on-level, one for advanced. Each version should take about 15 minutes.\nSOURCE: Apply differentiated instruction principles and Singapore MOE curriculum standards."},
    {title:"Parent Newsletter Paragraph",type:"Writing",prompt:"GOAL: Write a parent-facing update about classroom learning.\nCONTEXT: I am a Primary [level] [subject] teacher writing a monthly newsletter paragraph for parents.\nEXPECTATIONS: Warm, friendly tone. Jargon-free. Under 100 words. Mention what students are learning and one way parents can support at home.\nSOURCE: Based on the current term's learning focus for Primary [level] [subject] in Singapore."},
    {title:"Story Starter Generator",type:"Generating Ideas",prompt:"GOAL: Generate creative story starters for a writing class.\nCONTEXT: I am a Primary [level] English teacher preparing a creative writing lesson. Theme: [theme, e.g. adventure, friendship, mystery].\nEXPECTATIONS: Write 3 story starters, each 2-3 sentences. Each should spark imagination and leave room for the student to continue. Age-appropriate language.\nSOURCE: Use creative writing best practices suitable for primary school children aged [age range]."},
    {title:"Marking Rubric Creator",type:"Planning",prompt:"GOAL: Create a simple marking rubric for a student project.\nCONTEXT: I am assessing a Primary [level] [subject] project on [topic].\nEXPECTATIONS: Include 3 criteria and 3 performance levels: Excellent, Satisfactory, Needs Improvement. Present as a table. Language should be clear enough for students to self-assess.\nSOURCE: Align with MOE assessment standards for Primary [level] [subject]."},
    {title:"Science Revision Quiz",type:"Generating Ideas",prompt:"GOAL: Create a fun Science revision quiz for Primary students.\nCONTEXT: I am a Primary [level] Science teacher helping students revise [topic, e.g. the water cycle].\nEXPECTATIONS: 10 questions - mix of MCQ and short-answer. Include an answer key with brief explanations. Tone: simple and encouraging.\nSOURCE: Use MOE Primary Science syllabus concepts for [level] and the notes below: [paste notes]."},
    {title:"AI for Lesson Personalisation",type:"Planning",prompt:"GOAL: Use AI to personalise learning for students with different needs in my class.\nCONTEXT: I am a Primary [level] [subject] teacher in Singapore. I have students with varying learning profiles including [e.g. visual learners, students with dyslexia, advanced learners].\nEXPECTATIONS: Suggest 5 ways I can use AI tools to personalise my lessons. For each: describe how to use it, what to prompt the AI with, and any limitations to be aware of.\nSOURCE: Apply MOE Singapore's EdTech and AI in education guidelines and differentiated instruction best practices."},
  ]},
  {id:"ecommerce",label:"E-Commerce Executive",emoji:"🛒",color:"#F4A261",prompts:[
    {title:"Product Description Writer",type:"Writing",prompt:"GOAL: Write a compelling product listing description.\nCONTEXT: I am an e-commerce executive listing [product name] on [platform, e.g. Shopee/Lazada/website]. Key features: [list]. Target customer: [description].\nEXPECTATIONS: Persuasive, benefit-focused tone. Under 100 words. End with a clear call to action. Use short sentences and bullet points for features.\nSOURCE: Base this on copywriting best practices for e-commerce product listings in Southeast Asia."},
    {title:"Flash Sale Email",type:"Writing",prompt:"GOAL: Write a promotional email for a flash sale.\nCONTEXT: I am running a [duration] flash sale on [product/category]. Discount: [amount]. Audience: existing customers.\nEXPECTATIONS: Urgent, exciting tone. Include: subject line, opening hook, offer details, and one CTA button label. Under 150 words.\nSOURCE: Use email marketing best practices for retail promotions in Singapore."},
    {title:"Customer Review Response",type:"Responding",prompt:"GOAL: Write a professional response to a customer review.\nCONTEXT: A customer left this review on [platform]: '[paste review]'. Sentiment: [positive/negative/mixed].\nEXPECTATIONS: Friendly, professional tone. Acknowledge feedback, address concerns, offer next steps if needed. Under 80 words.\nSOURCE: Follow customer service best practices for e-commerce brands."},
    {title:"Ad Copy Generator",type:"Writing",prompt:"GOAL: Create short ad copy for a paid social campaign.\nCONTEXT: I am promoting [product] targeting [audience] on [platform, e.g. Facebook/Instagram/TikTok]. Budget focus: [awareness/conversion].\nEXPECTATIONS: Write 3 options. Each under 50 words. Include a punchy hook, one key benefit, and a CTA. Vary the tone across the 3 options.\nSOURCE: Use direct response copywriting principles suited for Southeast Asian social media audiences."},
    {title:"FAQ Section Builder",type:"Writing",prompt:"GOAL: Write a helpful FAQ section for a product page.\nCONTEXT: I sell [product/service] online. Customers commonly ask about: [list of concerns, e.g. shipping, returns, sizing].\nEXPECTATIONS: 5 questions and answers. Friendly, reassuring tone. Each answer under 40 words. Format as Q&A.\nSOURCE: Base on standard e-commerce customer concerns and best practices for product page UX."},
    {title:"Sales Campaign Planner",type:"Planning",prompt:"GOAL: Plan a campaign strategy for an upcoming major sale event.\nCONTEXT: I am an e-commerce executive planning a [e.g. 7.7/9.9/11.11] campaign. Target audience: [description]. Key product categories: [list].\nEXPECTATIONS: Campaign timeline and strategy. Include: KPIs, promotion ideas, content suggestions, and pre/during/post phases.\nSOURCE: Use previous campaign performance, sales data, and customer insights below: [paste data]."},
    {title:"AI for E-Commerce Workflows",type:"Generating Ideas",prompt:"GOAL: Identify AI tools and prompts that can streamline my e-commerce operations.\nCONTEXT: I am an e-commerce executive managing [product categories] on [platforms]. Key time-consuming tasks: [e.g. writing listings, responding to reviews, planning campaigns].\nEXPECTATIONS: Suggest 5 AI-powered workflow improvements. For each: describe the task, the AI tool or approach, and the expected time saving.\nSOURCE: Apply AI productivity best practices relevant to e-commerce operations in Southeast Asia."},
  ]},
  {id:"influencer",label:"Social Media Influencer",emoji:"📱",color:"#E76F51",prompts:[
    {title:"Caption Writer",type:"Writing",prompt:"GOAL: Write engaging captions for a social media post.\nCONTEXT: I am a [niche] influencer on [platform]. The post is about: [describe content/photo]. My audience is [describe audience].\nEXPECTATIONS: Write 3 caption options. Tone: [e.g. fun/motivational/relatable]. Include relevant hashtags.\nSOURCE: Apply social media copywriting best practices for [platform] engagement."},
    {title:"Weekly Content Calendar",type:"Planning",prompt:"GOAL: Plan a week of content for my social media.\nCONTEXT: I am a [niche] creator on [platform]. Upcoming theme: [topic/date]. Posting frequency: [number] times per week.\nEXPECTATIONS: 7 content ideas in a table. Columns: Day, Content Type, Topic, Format (Reel/Post/Story). Mix of educational, entertaining, and promotional.\nSOURCE: Base on current trends in [niche] and platform best practices for [platform] in 2025."},
    {title:"Brand Pitch Email",type:"Writing",prompt:"GOAL: Write a collaboration pitch email to a brand.\nCONTEXT: I am a [niche] influencer with [follower count] followers on [platform]. I want to pitch to [brand type]. My content style: [description].\nEXPECTATIONS: Confident, professional tone. Under 200 words. Include: who I am, why I am a good fit, what I am proposing, and a CTA.\nSOURCE: Use influencer marketing pitch best practices."},
    {title:"Video Hook Generator",type:"Generating Ideas",prompt:"GOAL: Create scroll-stopping opening hooks for a short video.\nCONTEXT: I am creating a [platform] video about [topic]. My target audience is [description].\nEXPECTATIONS: Write 5 different hooks. Each 1-2 sentences. Grab attention in the first 3 seconds. Vary the style: question, bold claim, story, shock, tip.\nSOURCE: Use short-form video hook writing techniques for [platform]."},
    {title:"Bio Rewriter",type:"Writing",prompt:"GOAL: Rewrite my social media bio to attract my ideal audience.\nCONTEXT: I am a [niche] creator targeting [target audience]. My current bio: [paste bio].\nEXPECTATIONS: Clear, punchy, and benefit-driven. Under 150 characters. Include a CTA if space allows.\nSOURCE: Apply personal branding and social media bio best practices for [platform]."},
    {title:"30-Day Content Calendar",type:"Planning",prompt:"GOAL: Create a 30-day social media content calendar to grow engagement and followers.\nCONTEXT: I create [niche] content on [platform]. Target: [audience description].\nEXPECTATIONS: Daily content schedule in a table. Include: Reel hooks, caption ideas, and CTA suggestions. Mix promotional, educational, and personal content.\nSOURCE: Use seasonal events in Singapore, audience interests, and current social media trends."},
    {title:"AI for Content Creation Workflow",type:"Generating Ideas",prompt:"GOAL: Build an AI-assisted content creation workflow to save time and post more consistently.\nCONTEXT: I am a [niche] content creator on [platform]. Key bottlenecks: [e.g. writing captions, coming up with ideas, editing scripts].\nEXPECTATIONS: Design a step-by-step weekly workflow using AI tools. Include: which AI tool to use at each step, example prompts, and estimated time saved.\nSOURCE: Apply AI productivity best practices for content creators in 2025."},
  ]},
  {id:"recruiter",label:"Recruiter",emoji:"💼",color:"#457B9D",prompts:[
    {title:"Job Description Writer",type:"Writing",prompt:"GOAL: Write a clear and attractive job description.\nCONTEXT: I am a recruiter hiring for a [job title] role at a [company type] in Singapore. Key responsibilities: [list]. Requirements: [list].\nEXPECTATIONS: Professional but welcoming tone. Include: role overview, responsibilities, requirements, and a short About Us section. Under 400 words.\nSOURCE: Follow recruitment best practices and job posting standards common in Singapore."},
    {title:"Candidate Outreach Message",type:"Writing",prompt:"GOAL: Write a personalised LinkedIn outreach message to a potential candidate.\nCONTEXT: I am recruiting for a [job title] role. The candidate is [brief profile]. Something relevant: [detail].\nEXPECTATIONS: Short (under 100 words), genuine, non-salesy tone. Reference why they stood out. End with a low-pressure question.\nSOURCE: Use professional outreach and recruitment messaging best practices for LinkedIn."},
    {title:"Interview Question Generator",type:"Generating Ideas",prompt:"GOAL: Generate a structured list of interview questions.\nCONTEXT: I am interviewing candidates for a [job title] position. The role requires: [key competencies].\nEXPECTATIONS: 8 questions. Mix: 3 behavioural, 3 situational, 2 technical. For 2 questions, include what a strong answer looks like.\nSOURCE: Apply competency-based interviewing frameworks and best practices."},
    {title:"Rejection Email",type:"Responding",prompt:"GOAL: Write a respectful rejection email to an unsuccessful candidate.\nCONTEXT: The candidate applied and interviewed for [job title]. They were not selected but performed reasonably well.\nEXPECTATIONS: Warm, professional tone. Under 150 words. Acknowledge their effort and leave the door open for future opportunities.\nSOURCE: Follow respectful candidate communication standards and HR best practices."},
    {title:"Offer Letter Draft",type:"Writing",prompt:"GOAL: Draft a formal job offer letter.\nCONTEXT: I am offering a [job title] position at [company type]. Start date: [date]. Salary: [amount]. Benefits: [list]. Reporting to: [manager title].\nEXPECTATIONS: Formal, clear, and warm tone. Include: role, start date, compensation, benefits, and acceptance instructions. Under 300 words.\nSOURCE: Follow standard employment offer letter conventions in Singapore, aligned with MOM guidelines."},
    {title:"Candidate Assessment Report",type:"Summarising",prompt:"GOAL: Write a structured candidate evaluation report.\nCONTEXT: I am a recruiter assessing a candidate for a [job title] role. The role requires: [key competencies]. Candidate background: [brief summary].\nEXPECTATIONS: 1-page assessment. Include: strengths, development areas, risks, and a hiring recommendation.\nSOURCE: Use the resume, interview notes, and role competency framework below: [paste details]."},
    {title:"AI for Recruitment Screening",type:"Generating Ideas",prompt:"GOAL: Use AI to speed up candidate screening and shortlisting without bias.\nCONTEXT: I am a recruiter handling [number] applications for a [job title] role. Key requirements: [list].\nEXPECTATIONS: Suggest 5 ways to use AI in the screening process. For each: describe the approach, the prompt to use, and any bias or ethical risks to watch for.\nSOURCE: Apply ethical AI recruitment practices and Singapore TAFEP fair hiring guidelines."},
  ]},
  {id:"enrichment",label:"Enrichment Centre Executive",emoji:"🏫",color:"#2A9D8F",prompts:[
    {title:"Class Schedule Announcement",type:"Writing",prompt:"GOAL: Write a parent announcement for a new class launch.\nCONTEXT: I work at an enrichment centre launching a new [subject] class starting [date]. Age group: [ages]. Class size: [number]. Fees: [amount].\nEXPECTATIONS: Friendly, enthusiastic tone. Under 150 words. Highlight 3 key benefits for the child. End with a clear registration CTA.\nSOURCE: Use marketing communication best practices for education brands targeting Singapore parents."},
    {title:"Trial Class WhatsApp Invite",type:"Writing",prompt:"GOAL: Write a WhatsApp message inviting parents to a free trial class.\nCONTEXT: I am promoting a trial for [subject] class for [age group]. Date: [date]. Time: [time]. Location: [place].\nEXPECTATIONS: Conversational, warm tone. Under 80 words. Include key details and a simple reply CTA.\nSOURCE: Use short-form parent communication best practices for Singapore enrichment centres."},
    {title:"Parent Progress Update",type:"Responding",prompt:"GOAL: Write a progress update message for a parent.\nCONTEXT: Updating a parent whose child (use initials only) has attended [subject] class for [duration]. Strengths: [list]. Areas to improve: [list].\nEXPECTATIONS: Warm, encouraging tone. Under 120 words. Balance positive feedback with constructive suggestions. End with next steps.\nSOURCE: Apply positive communication principles used in education settings."},
    {title:"Social Media Class Highlight",type:"Writing",prompt:"GOAL: Write a social media post celebrating a class activity.\nCONTEXT: Posting on [Facebook/Instagram] about a recent activity at our enrichment centre. Activity: [describe]. Age group: [ages].\nEXPECTATIONS: Warm, enthusiastic tone. Under 100 words. Include 3-5 relevant emojis. End with a soft CTA.\nSOURCE: Use social media content best practices for education and family-oriented brands in Singapore."},
    {title:"Trial Class Session Plan",type:"Planning",prompt:"GOAL: Design an engaging trial class experience that converts students into full enrolments.\nCONTEXT: I am planning a 60-minute trial class for [subject] for students aged [age range]. Parents may be observing.\nEXPECTATIONS: Lesson flow and facilitation guide. Include: icebreaker, main activity, parent engagement moment, and enrolment CTA.\nSOURCE: Use the programme objectives and student learning outcomes below: [paste details]."},
    {title:"Student Retention Strategy",type:"Planning",prompt:"GOAL: Develop strategies to reduce student dropouts after the first 3 months.\nCONTEXT: Some students lose interest and parents struggle with scheduling. Dropout point: [when it typically happens].\nEXPECTATIONS: Concise action plan. Include: loyalty ideas, parent communication improvements, and engagement activities.\nSOURCE: Use attendance records, student feedback, and parent survey insights below: [paste data]."},
    {title:"AI for Centre Operations",type:"Generating Ideas",prompt:"GOAL: Identify AI tools to improve daily operations at an enrichment centre.\nCONTEXT: I am an enrichment centre executive managing [number] students, [number] staff, and [number] programmes. Key pain points: [e.g. admin, scheduling, parent communication].\nEXPECTATIONS: Suggest 5 AI-powered improvements for centre operations. For each: describe the use case, recommended tool or prompt, and expected benefit.\nSOURCE: Apply AI productivity best practices for education businesses in Singapore."},
  ]},
  {id:"realestate",label:"Real Estate Agent",emoji:"🏠",color:"#8338EC",prompts:[
    {title:"Property Listing Description",type:"Writing",prompt:"GOAL: Write a compelling property listing.\nCONTEXT: I am a real estate agent listing a [HDB flat/condo/landed property] in [area], Singapore. Size: [sqft]. Asking price: [amount]. Key features: [list]. Target buyer: [profile].\nEXPECTATIONS: Persuasive, aspirational tone. Under 120 words. Highlight lifestyle benefits. End with a viewing CTA.\nSOURCE: Use property listing copywriting best practices for the Singapore residential property market."},
    {title:"Cold Outreach WhatsApp Message",type:"Writing",prompt:"GOAL: Write a non-pushy WhatsApp message to a potential seller.\nCONTEXT: I am a [agency name] agent reaching out to a homeowner in [area] who may be considering selling.\nEXPECTATIONS: Friendly, low-pressure tone. Under 80 words. Mention local market activity as a conversation opener.\nSOURCE: Apply ethical real estate outreach best practices for the Singapore market."},
    {title:"Open House Social Media Post",type:"Writing",prompt:"GOAL: Create a social media post promoting an open house viewing.\nCONTEXT: Hosting an open house for a [property type] in [location] on [date] at [time]. Target: prospective buyers in [price range].\nEXPECTATIONS: Exciting feel. Under 100 words. Include key property highlights, date/time, and a CTA.\nSOURCE: Use real estate social media marketing best practices for Singapore."},
    {title:"Client Follow-Up Email",type:"Responding",prompt:"GOAL: Write a follow-up email to a client who viewed a property.\nCONTEXT: The client viewed [brief property description] last week and has not responded. They seemed [interested/uncertain].\nEXPECTATIONS: Warm, helpful, no-pressure tone. Under 120 words. Reference the property and offer to arrange another viewing. Include a subject line.\nSOURCE: Apply real estate client relationship and follow-up communication best practices."},
    {title:"Monthly Property Market Report",type:"Summarising",prompt:"GOAL: Create a monthly property market report for clients.\nCONTEXT: Audience: HDB upgraders, homeowners, and investors. Report period: [month/year].\nEXPECTATIONS: Professional, client-friendly tone. Include: market trends, pricing analysis, and 2-3 recommendations. Under 400 words.\nSOURCE: Use URA data, HDB resale statistics, mortgage rate updates, and recent transaction data: [paste data]."},
    {title:"Social Media Lead Generation Plan",type:"Planning",prompt:"GOAL: Create a social media content strategy to generate buyer and seller leads.\nCONTEXT: Targeting HDB upgraders and property investors aged 35-55 in Singapore.\nEXPECTATIONS: 30-day content plan. Include: video ideas, post hooks, and CTA suggestions. Mix educational, market update, and testimonial content.\nSOURCE: Use current Singapore property trends and audience pain points."},
    {title:"AI for Property Client Management",type:"Generating Ideas",prompt:"GOAL: Use AI to manage client relationships and automate follow-ups more effectively.\nCONTEXT: I am a real estate agent in Singapore managing [number] active clients at different stages of the buying or selling journey.\nEXPECTATIONS: Suggest 5 AI-powered approaches to client management. For each: describe the use case, a sample prompt, and the client benefit.\nSOURCE: Apply AI productivity best practices for real estate professionals in the Singapore property market."},
  ]},
  {id:"hrmanager",label:"HR Manager",emoji:"👥",color:"#C77DFF",prompts:[
    {title:"HR Policy Summary",type:"Writing",prompt:"GOAL: Write a plain-language summary of an HR policy.\nCONTEXT: I am an HR Manager at a [company type] in Singapore. Policy: [policy name]. Audience: all employees.\nEXPECTATIONS: Clear, jargon-free language. Bullet points. Under 200 words. Include: what the policy covers, key rules, and who to contact.\nSOURCE: Based on Singapore MOM employment guidelines and our internal policy: [paste key points]."},
    {title:"Onboarding Checklist",type:"Planning",prompt:"GOAL: Create a structured onboarding checklist for a new hire.\nCONTEXT: Onboarding a new [job title] at a [company type]. Start date: [date]. Department: [department].\nEXPECTATIONS: Checklist format. Cover: Day 1, Week 1, and Month 1 tasks. Assign ownership (HR/Manager/New Hire) for each task.\nSOURCE: Apply onboarding best practices and Singapore employment requirements (CPF registration, contract signing)."},
    {title:"Performance Review Template",type:"Planning",prompt:"GOAL: Create a fair and structured performance review template.\nCONTEXT: Designing a mid-year or annual review form for [job level] staff at a [company type].\nEXPECTATIONS: Include 5 evaluation criteria, a self-assessment section, a manager rating section (1-5 scale), and a development goals section.\nSOURCE: Apply performance management best practices and HR frameworks commonly used in Singapore organisations."},
    {title:"Employee Grievance Response",type:"Responding",prompt:"GOAL: Draft a professional response to an employee grievance.\nCONTEXT: An employee raised a concern about [issue, e.g. workplace conflict, unfair treatment].\nEXPECTATIONS: Empathetic, professional, neutral tone. Under 150 words. Acknowledge the concern, confirm it will be investigated, state expected timeline.\nSOURCE: Follow fair employment practices and MOM grievance handling guidelines in Singapore."},
    {title:"Training Needs Analysis Questions",type:"Generating Ideas",prompt:"GOAL: Generate survey questions to identify employee training needs.\nCONTEXT: Conducting an annual TNA for [department or all staff] at a [company type].\nEXPECTATIONS: Write 8 survey questions. Mix of Likert scale and open-ended. Cover: skill gaps, preferred learning formats, and career development goals.\nSOURCE: Apply Training Needs Analysis best practices and SkillsFuture Singapore frameworks."},
    {title:"AI for HR Operations",type:"Generating Ideas",prompt:"GOAL: Identify practical ways to use AI to improve HR processes and reduce administrative workload.\nCONTEXT: I am an HR Manager at a [company type] in Singapore. Key HR functions: [e.g. recruitment, onboarding, performance management, L&D]. Current pain points: [list].\nEXPECTATIONS: Suggest 5 AI-powered HR workflow improvements. For each: describe the process, the AI approach, and any compliance or data privacy considerations relevant to Singapore.\nSOURCE: Apply AI in HR best practices and Singapore PDPA data protection guidelines."},
  ]},

  {id:"financialadvisor",label:"Financial Advisor",emoji:"📈",color:"#1B4332",prompts:[

  {id:"eventplanner",label:"Event Planner",emoji:"🎪",color:"#9B2335",prompts:[
