const roles=[
  {id:"student",label:"Secondary School Student",emoji:"📚",prompts:[
    {title:"Essay Outline Helper",type:"Planning",prompt:"Help me create a structured essay outline.\nI am a Secondary [level] student writing an 800-word essay on [topic] for [subject] class.\nGive me an outline with an introduction, 3 main points, and a conclusion. Use simple, student-friendly language. Present it as a numbered list.\nBase this on general knowledge and standard essay structure for secondary school level."},
    {title:"Simplify a Concept",type:"Summarising",prompt:"Explain a complex concept in simple terms.\nI am a Secondary 3 student struggling to understand [concept] for my [subject] class.\nUse plain language, one real-life example, and a 3-bullet summary at the end. Keep it under 200 words.\nUse general educational knowledge appropriate for Secondary school level in Singapore."},
    {title:"Study Quiz Generator",type:"Generating Ideas",prompt:"Create a revision quiz to help me study.\nI have an exam on [topic] for [subject] coming up in [timeframe].\nWrite 5 multiple-choice questions with 4 options each. Include the correct answers at the end. Difficulty level: [easy/medium/hard].\nBase questions on the Singapore MOE syllabus for [subject] at Secondary [level]."},
    {title:"Improve My Writing",type:"Writing",prompt:"Improve the vocabulary and sentence structure of my paragraph.\nI am a Secondary [level] student. Here is my original paragraph: [paste paragraph].\nShow me a before-and-after comparison. Keep my original ideas intact. Aim for a Grade [level] writing standard. Use British English.\nApply standard English grammar and writing conventions for secondary school essays."},
    {title:"Revision Summary Sheet",type:"Summarising",prompt:"Create a quick revision summary I can study from.\nI have an exam on [topic] in [subject] in 3 days. I need a concise reference sheet.\nBullet points only. Max 1 page. Highlight the 5 most important concepts. Include any formulae or key terms.\nUse the Singapore MOE [subject] syllabus for Secondary [level]."},
    {title:"School Presentation Script",type:"Writing",prompt:"Help me prepare a confident and engaging school presentation.\nI am a Secondary [level] student presenting on [topic] to my classmates aged 13-16. Duration: 3 minutes.\nWrite a presentation script with slide suggestions. Include a strong opening hook, one statistic, and one real-life example. Tone: conversational and relatable.\nUse recent examples, school-related scenarios, and the notes I provide: [paste notes]."},
    {title:"AI Study Assistant Setup",type:"Generating Ideas",prompt:"Help me use AI tools effectively to support my studying without doing the work for me.\nI am a Secondary [level] student studying [subject]. I want to use AI to help me understand concepts, practise questions, and review my work.\nGive me 5 specific ways I can use AI as a study assistant. Include example prompts I can use. Tone: practical and student-friendly.\nApply responsible AI use principles and Singapore MOE guidelines on digital literacy for students."},
  ]},
  {id:"socialworker",label:"Social Worker",emoji:"🤝",prompts:[
    {title:"Case Note Writer",type:"Writing",prompt:"Write a professional case note for a client session.\nI am a social worker. Client profile (no real names): [brief description]. Key issues discussed: [list]. Outcome and follow-up actions: [list].\nUse a neutral, factual, third-person tone. Follow the SOAP format. Keep it under 250 words.\nApply standard social work documentation practices used in Singapore social service agencies."},
    {title:"Resource Referral Email",type:"Writing",prompt:"Draft a referral email to connect a client with an external organisation.\nI am a social worker referring a client who needs [type of support] to [organisation type]. The reason for referral: [brief explanation].\nProfessional and concise tone. Include: reason for referral, client background (no identifiers), and requested support. Under 200 words.\nBase this on standard referral letter conventions used by social service organisations in Singapore."},
    {title:"Psychoeducation Script",type:"Writing",prompt:"Write a simple explanation of a mental health topic for a client.\nMy client has low health literacy and needs to understand [mental health topic, e.g. anxiety]. They are [age group].\nPlain language, no jargon. Use an analogy to explain the concept. Max 150 words. Warm and non-clinical tone.\nUse evidence-based psychoeducation principles and reputable mental health references."},
    {title:"Session Agenda Planner",type:"Planning",prompt:"Plan a structured support session for a client.\nI am a social worker preparing a 45-minute session for a [client profile, e.g. at-risk youth]. Session goals: [list].\nInclude a timed agenda with: icebreaker (5 min), main activity (30 min), and closing reflection (10 min). Suggest one activity per section.\nDraw from evidence-based social work intervention methods and youth engagement practices."},
    {title:"Grant Report Draft",type:"Writing",prompt:"Draft a concise programme report for a community grant submission.\nProgramme name: [name]. Target group: [group]. Key activities run: [list]. Outcomes achieved: [list]. Reporting period: [dates].\nFormal but readable tone. Under 300 words. Use headings. Highlight impact with specific numbers where possible.\nFollow standard grant reporting conventions used by Singapore VWOs and SSAs."},
    {title:"Youth Wellness Workshop",type:"Planning",prompt:"Design an engaging youth wellness workshop on managing stress and anxiety.\nI am a social worker facilitating a 90-minute session for youths aged 15-18 in Singapore.\nWorkshop outline with activities. Include: icebreakers, group discussions, and coping strategies. Tone: encouraging and supportive.\nUse evidence-based mental wellness approaches and examples relevant to Singapore youths."},
    {title:"AI for Case Management",type:"Generating Ideas",prompt:"Identify ways to use AI tools to improve efficiency in social work case management.\nI am a social worker managing a high caseload at a [organisation type] in Singapore. I want to use AI responsibly to save time on administrative tasks.\nGive me 5 practical AI use cases relevant to my role. For each: describe the task, suggest an AI tool or prompt approach, and flag any ethical considerations.\nApply responsible AI use principles and social work professional ethics guidelines (SASW Code of Ethics, Singapore)."},
  ]},
  {id:"teacher",label:"Primary School Teacher",emoji:"🍎",prompts:[
    {title:"Lesson Plan Builder",type:"Planning",prompt:"Create a ready-to-use lesson plan.\nI am a Primary [level] [subject] teacher in Singapore. Topic: [topic]. Duration: 30 minutes. Class size: [number].\nInclude: learning objectives, warm-up activity, main activity, and closing assessment. Use MOE-aligned language. Present in a table format.\nAlign with the Singapore MOE primary school [subject] curriculum and syllabus."},
    {title:"Differentiated Activity",type:"Planning",prompt:"Create differentiated activities for a mixed-ability class.\nI am teaching [topic] to a Primary [level] class with varying ability levels.\nProvide 3 versions of the same activity - one for struggling learners, one for on-level, one for advanced. Each version should take about 15 minutes.\nApply differentiated instruction principles and Singapore MOE curriculum standards."},
    {title:"Parent Newsletter",type:"Writing",prompt:"Write a parent-facing update about classroom learning.\nI am a Primary [level] [subject] teacher writing a monthly newsletter paragraph for parents.\nWarm, friendly tone. Jargon-free. Under 100 words. Mention what students are learning and one way parents can support at home.\nBased on the current term's learning focus for Primary [level] [subject] in Singapore."},
    {title:"Story Starter Generator",type:"Generating Ideas",prompt:"Generate creative story starters for a writing class.\nI am a Primary [level] English teacher preparing a creative writing lesson. Theme: [theme, e.g. adventure, friendship, mystery].\nWrite 3 story starters, each 2-3 sentences. Each should spark imagination and leave room for the student to continue. Age-appropriate language.\nUse creative writing best practices suitable for primary school children aged [age range]."},
    {title:"Marking Rubric Creator",type:"Planning",prompt:"Create a simple marking rubric for a student project.\nI am assessing a Primary [level] [subject] project on [topic].\nInclude 3 criteria and 3 performance levels: Excellent, Satisfactory, Needs Improvement. Present as a table. Language should be clear enough for students to self-assess.\nAlign with MOE assessment standards for Primary [level] [subject]."},
    {title:"Science Revision Quiz",type:"Generating Ideas",prompt:"Create a fun Science revision quiz for Primary students.\nI am a Primary [level] Science teacher helping students revise [topic, e.g. the water cycle].\n10 questions - mix of MCQ and short-answer. Include an answer key with brief explanations. Tone: simple and encouraging.\nUse MOE Primary Science syllabus concepts for [level] and the notes below: [paste notes]."},
    {title:"AI for Lesson Personalisation",type:"Planning",prompt:"Use AI to personalise learning for students with different needs in my class.\nI am a Primary [level] [subject] teacher in Singapore. I have students with varying learning profiles including [e.g. visual learners, students with dyslexia, advanced learners].\nSuggest 5 ways I can use AI tools to personalise my lessons. For each: describe how to use it, what to prompt the AI with, and any limitations to be aware of.\nApply MOE Singapore's EdTech and AI in education guidelines and differentiated instruction best practices."},
  ]},
  {id:"ecommerce",label:"E-Commerce Executive",emoji:"🛒",prompts:[
    {title:"Product Description Writer",type:"Writing",prompt:"Write a compelling product listing description.\nI am an e-commerce executive listing [product name] on [platform, e.g. Shopee/Lazada/website]. Key features: [list]. Target customer: [description].\nPersuasive, benefit-focused tone. Under 100 words. End with a clear call to action. Use short sentences and bullet points for features.\nBase this on copywriting best practices for e-commerce product listings in Southeast Asia."},
    {title:"Flash Sale Email",type:"Writing",prompt:"Write a promotional email for a flash sale.\nI am running a [duration] flash sale on [product/category]. Discount: [amount]. Audience: existing customers.\nUrgent, exciting tone. Include: subject line, opening hook, offer details, and one CTA button label. Under 150 words.\nUse email marketing best practices for retail promotions in Singapore."},
    {title:"Customer Review Response",type:"Responding",prompt:"Write a professional response to a customer review.\nA customer left this review on [platform]: '[paste review]'. Sentiment: [positive/negative/mixed].\nFriendly, professional tone. Acknowledge feedback, address concerns, offer next steps if needed. Under 80 words.\nFollow customer service best practices for e-commerce brands."},
    {title:"Ad Copy Generator",type:"Writing",prompt:"Create short ad copy for a paid social campaign.\nI am promoting [product] targeting [audience] on [platform, e.g. Facebook/Instagram/TikTok]. Budget focus: [awareness/conversion].\nWrite 3 options. Each under 50 words. Include a punchy hook, one key benefit, and a CTA. Vary the tone across the 3 options.\nUse direct response copywriting principles suited for Southeast Asian social media audiences."},
    {title:"FAQ Section Builder",type:"Writing",prompt:"Write a helpful FAQ section for a product page.\nI sell [product/service] online. Customers commonly ask about: [list of concerns, e.g. shipping, returns, sizing].\n5 questions and answers. Friendly, reassuring tone. Each answer under 40 words. Format as Q&A.\nBase on standard e-commerce customer concerns and best practices for product page UX."},
    {title:"Sales Campaign Planner",type:"Planning",prompt:"Plan a campaign strategy for an upcoming major sale event.\nI am an e-commerce executive planning a [e.g. 7.7/9.9/11.11] campaign. Target audience: [description]. Key product categories: [list].\nCampaign timeline and strategy. Include: KPIs, promotion ideas, content suggestions, and pre/during/post phases.\nUse previous campaign performance, sales data, and customer insights below: [paste data]."},
    {title:"AI for E-Commerce Workflows",type:"Generating Ideas",prompt:"Identify AI tools and prompts that can streamline my e-commerce operations.\nI am an e-commerce executive managing [product categories] on [platforms]. Key time-consuming tasks: [e.g. writing listings, responding to reviews, planning campaigns].\nSuggest 5 AI-powered workflow improvements. For each: describe the task, the AI tool or approach, and the expected time saving.\nApply AI productivity best practices relevant to e-commerce operations in Southeast Asia."},
  ]},
  {id:"influencer",label:"Social Media Influencer",emoji:"📱",prompts:[
    {title:"Caption Writer",type:"Writing",prompt:"Write engaging captions for a social media post.\nI am a [niche] influencer on [platform]. The post is about: [describe content/photo]. My audience is [describe audience].\nWrite 3 caption options. Tone: [e.g. fun/motivational/relatable]. Include relevant hashtags.\nApply social media copywriting best practices for [platform] engagement."},
    {title:"Weekly Content Calendar",type:"Planning",prompt:"Plan a week of content for my social media.\nI am a [niche] creator on [platform]. Upcoming theme: [topic/date]. Posting frequency: [number] times per week.\n7 content ideas in a table. Columns: Day, Content Type, Topic, Format (Reel/Post/Story). Mix of educational, entertaining, and promotional.\nBase on current trends in [niche] and platform best practices for [platform] in 2025."},
    {title:"Brand Pitch Email",type:"Writing",prompt:"Write a collaboration pitch email to a brand.\nI am a [niche] influencer with [follower count] followers on [platform]. I want to pitch to [brand type]. My content style: [description].\nConfident, professional tone. Under 200 words. Include: who I am, why I am a good fit, what I am proposing, and a CTA.\nUse influencer marketing pitch best practices."},
    {title:"Video Hook Generator",type:"Generating Ideas",prompt:"Create scroll-stopping opening hooks for a short video.\nI am creating a [platform] video about [topic]. My target audience is [description].\nWrite 5 different hooks. Each 1-2 sentences. Grab attention in the first 3 seconds. Vary the style: question, bold claim, story, shock, tip.\nUse short-form video hook writing techniques for [platform]."},
    {title:"Bio Rewriter",type:"Writing",prompt:"Rewrite my social media bio to attract my ideal audience.\nI am a [niche] creator targeting [target audience]. My current bio: [paste bio].\nClear, punchy, and benefit-driven. Under 150 characters. Include a CTA if space allows.\nApply personal branding and social media bio best practices for [platform]."},
    {title:"30-Day Content Calendar",type:"Planning",prompt:"Create a 30-day social media content calendar to grow engagement and followers.\nI create [niche] content on [platform]. Target: [audience description].\nDaily content schedule in a table. Include: Reel hooks, caption ideas, and CTA suggestions. Mix promotional, educational, and personal content.\nUse seasonal events in Singapore, audience interests, and current social media trends."},
    {title:"AI Content Workflow",type:"Generating Ideas",prompt:"Build an AI-assisted content creation workflow to save time and post more consistently.\nI am a [niche] content creator on [platform]. Key bottlenecks: [e.g. writing captions, coming up with ideas, editing scripts].\nDesign a step-by-step weekly workflow using AI tools. Include: which AI tool to use at each step, example prompts, and estimated time saved.\nApply AI productivity best practices for content creators in 2025."},
  ]},
  {id:"recruiter",label:"Recruiter",emoji:"💼",prompts:[
    {title:"Job Description Writer",type:"Writing",prompt:"Write a clear and attractive job description.\nI am a recruiter hiring for a [job title] role at a [company type] in Singapore. Key responsibilities: [list]. Requirements: [list].\nProfessional but welcoming tone. Include: role overview, responsibilities, requirements, and a short About Us section. Under 400 words.\nFollow recruitment best practices and job posting standards common in Singapore."},
    {title:"Candidate Outreach Message",type:"Writing",prompt:"Write a personalised LinkedIn outreach message to a potential candidate.\nI am recruiting for a [job title] role. The candidate is [brief profile]. Something relevant: [detail].\nShort (under 100 words), genuine, non-salesy tone. Reference why they stood out. End with a low-pressure question.\nUse professional outreach and recruitment messaging best practices for LinkedIn."},
    {title:"Interview Questions",type:"Generating Ideas",prompt:"Generate a structured list of interview questions.\nI am interviewing candidates for a [job title] position. The role requires: [key competencies].\n8 questions. Mix: 3 behavioural, 3 situational, 2 technical. For 2 questions, include what a strong answer looks like.\nApply competency-based interviewing frameworks and best practices."},
    {title:"Rejection Email",type:"Responding",prompt:"Write a respectful rejection email to an unsuccessful candidate.\nThe candidate applied and interviewed for [job title]. They were not selected but performed reasonably well.\nWarm, professional tone. Under 150 words. Acknowledge their effort and leave the door open for future opportunities.\nFollow respectful candidate communication standards and HR best practices."},
    {title:"Offer Letter Draft",type:"Writing",prompt:"Draft a formal job offer letter.\nI am offering a [job title] position at [company type]. Start date: [date]. Salary: [amount]. Benefits: [list]. Reporting to: [manager title].\nFormal, clear, and warm tone. Include: role, start date, compensation, benefits, and acceptance instructions. Under 300 words.\nFollow standard employment offer letter conventions in Singapore, aligned with MOM guidelines."},
    {title:"Candidate Assessment Report",type:"Summarising",prompt:"Write a structured candidate evaluation report.\nI am a recruiter assessing a candidate for a [job title] role. The role requires: [key competencies]. Candidate background: [brief summary].\n1-page assessment. Include: strengths, development areas, risks, and a hiring recommendation.\nUse the resume, interview notes, and role competency framework below: [paste details]."},
    {title:"AI for Recruitment Screening",type:"Generating Ideas",prompt:"Use AI to speed up candidate screening and shortlisting without bias.\nI am a recruiter handling [number] applications for a [job title] role. Key requirements: [list].\nSuggest 5 ways to use AI in the screening process. For each: describe the approach, the prompt to use, and any bias or ethical risks to watch for.\nApply ethical AI recruitment practices and Singapore TAFEP fair hiring guidelines."},
  ]},
  {id:"enrichment",label:"Enrichment Centre Executive",emoji:"🏫",prompts:[
    {title:"Class Announcement",type:"Writing",prompt:"Write a parent announcement for a new class launch.\nI work at an enrichment centre launching a new [subject] class starting [date]. Age group: [ages]. Class size: [number]. Fees: [amount].\nFriendly, enthusiastic tone. Under 150 words. Highlight 3 key benefits for the child. End with a clear registration CTA.\nUse marketing communication best practices for education brands targeting Singapore parents."},
    {title:"Trial Class WhatsApp Invite",type:"Writing",prompt:"Write a WhatsApp message inviting parents to a free trial class.\nI am promoting a trial for [subject] class for [age group]. Date: [date]. Time: [time]. Location: [place].\nConversational, warm tone. Under 80 words. Include key details and a simple reply CTA.\nUse short-form parent communication best practices for Singapore enrichment centres."},
    {title:"Parent Progress Update",type:"Responding",prompt:"Write a progress update message for a parent.\nUpdating a parent whose child (use initials only) has attended [subject] class for [duration]. Strengths: [list]. Areas to improve: [list].\nWarm, encouraging tone. Under 120 words. Balance positive feedback with constructive suggestions. End with next steps.\nApply positive communication principles used in education settings."},
    {title:"Social Media Post",type:"Writing",prompt:"Write a social media post celebrating a class activity.\nPosting on [Facebook/Instagram] about a recent activity at our enrichment centre. Activity: [describe]. Age group: [ages].\nWarm, enthusiastic tone. Under 100 words. Include 3-5 relevant emojis. End with a soft CTA.\nUse social media content best practices for education and family-oriented brands in Singapore."},
    {title:"Trial Class Session Plan",type:"Planning",prompt:"Design an engaging trial class experience that converts students into full enrolments.\nI am planning a 60-minute trial class for [subject] for students aged [age range]. Parents may be observing.\nLesson flow and facilitation guide. Include: icebreaker, main activity, parent engagement moment, and enrolment CTA.\nUse the programme objectives and student learning outcomes below: [paste details]."},

    {title:"AI for Centre Operations",type:"Generating Ideas",prompt:"Identify AI tools to improve daily operations at an enrichment centre.\nI am an enrichment centre executive managing [number] students, [number] staff, and [number] programmes. Key pain points: [e.g. admin, scheduling, parent communication].\nSuggest 5 AI-powered improvements for centre operations. For each: describe the use case, recommended tool or prompt, and expected benefit.\nApply AI productivity best practices for education businesses in Singapore."},
  ]},
  {id:"realestate",label:"Real Estate Agent",emoji:"🏠",prompts:[

    {title:"Cold Outreach WhatsApp",type:"Writing",prompt:"Write a non-pushy WhatsApp message to a potential seller.\nI am a [agency name] agent reaching out to a homeowner in [area] who may be considering selling.\nFriendly, low-pressure tone. Under 80 words. Mention local market activity as a conversation opener.\nApply ethical real estate outreach best practices for the Singapore market."},

  ]},
  {id:"hrmanager",label:"HR Manager",emoji:"👥",prompts:[

    {title:"AI for HR Operations",type:"Generating Ideas",prompt:"Identify practical ways to use AI to improve HR processes and reduce administrative workload.\nI am an HR Manager at a [company type] in Singapore. Key HR functions: [e.g. recruitment, onboarding, performance management, L&D]. Current pain points: [list].\nSuggest 5 AI-powered HR workflow improvements. For each: describe the process, the AI approach, and any compliance or data privacy considerations relevant to Singapore.\nApply AI in HR best practices and Singapore PDPA data protection guidelines."},
